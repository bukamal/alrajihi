name: Architecture Guard

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  architecture-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check client data-access boundaries
        run: python tools/architecture_guard.py

      - name: Phase 32 invoice/offline guard
        run: python tools/phase32_invoice_flow_guard.py
      - name: Reports widget contract check
        run: python tools/reports_contract_check.py

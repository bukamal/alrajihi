name: Build Windows Installer

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install requirements
        shell: pwsh
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify requirements file
        shell: pwsh
        run: |
          python tools\verify_requirements_file.py

      - name: Validate imports
        shell: pwsh
        run: |
          python -c "import PyQt5"
          python -c "import cv2"
          python -c "from pyzbar.pyzbar import decode"
          python -c "import qrcode"
          python -c "import barcode"
          python -c "import qtawesome"
          python -c "import pyqtgraph"

      - name: Verify project structure
        shell: pwsh
        run: |
          if (!(Test-Path "alrajhi_client\main.py")) {
            throw "Missing alrajhi_client\main.py"
          }
          if (!(Test-Path "alrajhi_client\assets\brand\app.ico")) {
            throw "Missing branded app icon"
          }
          if (!(Test-Path "alrajhi_client\assets\brand\logo.png")) {
            throw "Missing branded app logo"
          }
          python tools\verify_branding_assets.py

      - name: Copy pyzbar DLLs
        shell: pwsh
        run: |
          $code = @"
          import os
          import shutil
          import pyzbar

          base = os.path.dirname(pyzbar.__file__)

          for dll in ("libiconv.dll", "libzbar-64.dll", "libzbar-32.dll"):
              src = os.path.join(base, dll)
              if os.path.exists(src):
                  shutil.copy(src, ".")
                  print("Copied", dll)
          "@

          Set-Content -Path copy_pyzbar_dlls.py -Value $code -Encoding UTF8
          python copy_pyzbar_dlls.py

      - name: Locate Qt platforms
        id: qtpath
        shell: pwsh
        run: |
          $path = python -c "import PyQt5, os; print(os.path.join(os.path.dirname(PyQt5.__file__), 'Qt5', 'plugins', 'platforms'))"
          echo "platforms_path=$path" >> $env:GITHUB_OUTPUT

      - name: Release hardening guards
        shell: pwsh
        run: |
          python tools\release_packaging_guard.py
          python tools\release_translations_guard.py
          python tools\release_theme_guard.py
          python tools\release_hidden_imports_guard.py
          python tools\unified_printing_guard.py

      - name: Build executable
        shell: pwsh
        run: |
          $iconPath = (Resolve-Path "alrajhi_client\assets\brand\app.ico").Path
          $qtPlatforms = "${{ steps.qtpath.outputs.platforms_path }}"
          $extra = @()

          foreach ($dll in @("libiconv.dll", "libzbar-64.dll", "libzbar-32.dll")) {
            if (Test-Path $dll) {
              $extra += "--add-binary"
              $extra += "$dll;."
            }
          }

          $versionInfo = @'
          # UTF-8
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=(1, 0, 0, 0),
              prodvers=(1, 0, 0, 0),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0)
            ),
            kids=[
              StringFileInfo([
                StringTable(
                  '040904B0',
                  [StringStruct('CompanyName', 'الراجحي'),
                   StringStruct('FileDescription', 'الراجحي للمحاسبة والمستودعات'),
                   StringStruct('FileVersion', '1.0.0.0'),
                   StringStruct('InternalName', 'AlrajhiAccounting'),
                   StringStruct('OriginalFilename', 'AlrajhiAccounting.exe'),
                   StringStruct('ProductName', 'الراجحي للمحاسبة والمستودعات'),
                   StringStruct('ProductVersion', '1.0.0.0')])
              ]),
              VarFileInfo([VarStruct('Translation', [1033, 1200])])
            ]
          )
          '@
          $versionInfo = $versionInfo -replace '(?m)^          ', ''
          Set-Content -Path version_info.txt -Value $versionInfo -Encoding UTF8

          $pyinstallerArgs = @(
            "--clean",
            "--noconfirm",
            "--onedir",
            "--windowed",
            "--name", "AlrajhiAccounting",
            "--icon", $iconPath,
            "--version-file", "version_info.txt",
            "--additional-hooks-dir", "build/hooks",
            "--paths", "alrajhi_client",
            "--paths", ".",
            "--collect-all", "PyQt5",
            "--collect-all", "pyzbar",
            "--collect-all", "cv2",
            "--collect-all", "qrcode",
            "--collect-all", "barcode",
            "--collect-all", "qtawesome",
            "--collect-all", "pyqtgraph",
            "--collect-submodules", "alrajhi_client.features",
            "--collect-submodules", "alrajhi_client.workspace",
            "--collect-submodules", "alrajhi_client.shell",
            "--collect-submodules", "alrajhi_client.ui",
            "--collect-submodules", "alrajhi_client.views.restaurant",
            "--collect-submodules", "alrajhi_client.printing",
            "--collect-submodules", "features",
            "--collect-submodules", "workspace",
            "--collect-submodules", "shell",
            "--collect-submodules", "ui",
            "--collect-submodules", "views.restaurant",
            "--collect-submodules", "printing",
            "--collect-data", "printing",
            "--collect-data", "alrajhi_client.printing",
            "--hidden-import", "printing._template_loader",
            "--hidden-import", "printing.print_templates",
            "--hidden-import", "printing.printing_service",
            "--hidden-import", "printing.print_manager",
            "--hidden-import", "printing.thermal_printer",
            "--hidden-import", "printing.label_designer",
            "--hidden-import", "alrajhi_client.printing._template_loader",
            "--hidden-import", "alrajhi_client.printing.print_templates",
            "--hidden-import", "alrajhi_client.printing.printing_service",
            "--hidden-import", "alrajhi_client.printing.print_manager",
            "--hidden-import", "pyzbar.pyzbar",
            "--hidden-import", "cv2",
            "--hidden-import", "qrcode",
            "--hidden-import", "barcode",
            "--hidden-import", "decimal",
            "--hidden-import", "sqlite3",
            "--hidden-import", "requests",
            "--hidden-import", "cryptography",
            "--hidden-import", "openpyxl",
            "--hidden-import", "reportlab",
            "--hidden-import", "waitress",
            "--hidden-import", "flask",
            "--hidden-import", "flask_jwt_extended",
            "--hidden-import", "views.restaurant",
            "--hidden-import", "views.restaurant.restaurant_dashboard",
            "--hidden-import", "views.restaurant.table_map_widget",
            "--hidden-import", "views.restaurant.restaurant_pos_widget",
            "--hidden-import", "views.restaurant.kitchen_display_widget",
            "--hidden-import", "views.restaurant.restaurant_analytics_widget",
            "--hidden-import", "core.services.restaurant_service",
            "--hidden-import", "gateways.restaurant_gateway",
            "--hidden-import", "gateways.local.restaurant_gateway",
            "--hidden-import", "gateways.remote.restaurant_gateway",
            "--hidden-import", "features.items.item_editor_tab",
            "--hidden-import", "features.categories.category_editor_tab",
            "--hidden-import", "features.invoices.invoice_editor_tab",
            "--hidden-import", "features.returns.return_editor_tabs",
            "--hidden-import", "features.parties.party_editor_tab",
            "--hidden-import", "features.vouchers.voucher_editor_tab",
            "--hidden-import", "features.finance.documents.cashbox_document_tab",
            "--hidden-import", "features.finance.documents.bank_account_document_tab",
            "--hidden-import", "features.finance.documents.expense_document_tab",
            "--hidden-import", "features.branches.documents.branch_document_tab",
            "--hidden-import", "features.inventory.documents.warehouse_document_tab",
            "--hidden-import", "features.inventory.documents.inventory_transfer_document_tab",
            "--hidden-import", "features.users.documents.user_document_tab",
            "--hidden-import", "features.transactions.transaction_document_tab",
            "--hidden-import", "features.transactions.documents.sales_invoice_tab",
            "--hidden-import", "features.transactions.documents.purchase_invoice_tab",
            "--hidden-import", "features.transactions.documents.sales_return_tab",
            "--hidden-import", "features.transactions.documents.purchase_return_tab",
            "--hidden-import", "features.manufacturing.bom_document_tab",
            "--hidden-import", "features.manufacturing.production_order_document_tab",
            "--hidden-import", "features.settings.settings_document_tabs",
            "--hidden-import", "features.transactions.components.transaction_document_layout",
            "--hidden-import", "features.transactions.grids.transaction_line_grid",
            "--hidden-import", "workspace.documents.base_document_tab",
            "--hidden-import", "shell.tab_workspace",
            "--hidden-import", "shell.quick_open_dialog",
            "--add-data", "$qtPlatforms;platforms",
            "--add-data", "alrajhi_client\assets;assets",
            "--add-data", "alrajhi_client\assets;alrajhi_client\assets",
            "--add-data", "alrajhi_client\printing\print_templates.py;printing",
            "--add-data", "alrajhi_client\printing\print_templates.py;alrajhi_client\printing"
          ) + $extra + @("alrajhi_client\main.py")

          pyinstaller @pyinstallerArgs

          if (!(Test-Path "dist\AlrajhiAccounting\AlrajhiAccounting.exe")) {
            throw "PyInstaller build failed: missing dist\AlrajhiAccounting\AlrajhiAccounting.exe"
          }
          $packagedAssetCandidates = @(
            "dist\AlrajhiAccounting\assets\brand\app.ico",
            "dist\AlrajhiAccounting\_internal\assets\brand\app.ico"
          )
          if (!(($packagedAssetCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1))) {
            throw "Portable build missing packaged project icon assets"
          }

          $clientAssetCandidates = @(
            "dist\AlrajhiAccounting\alrajhi_client\assets\brand\app.ico",
            "dist\AlrajhiAccounting\_internal\alrajhi_client\assets\brand\app.ico"
          )
          if (!(($clientAssetCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1))) {
            throw "Portable build missing alrajhi_client project icon assets"
          }



      - name: Download Inno Setup
        shell: pwsh
        run: |
          curl -L -o is.exe https://jrsoftware.org/download.php/is.exe
          .\is.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART

      - name: Download Arabic Language
        shell: pwsh
        run: |
          curl -L -o "C:\Program Files (x86)\Inno Setup 6\Languages\Arabic.isl" https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Arabic.isl

      - name: Create Inno Setup Scripts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output | Out-Null
          $iconPath = (Resolve-Path "alrajhi_client\assets\brand\app.ico").Path

          function Write-AlrajhiInstallerScript {
            param(
              [string]$Path,
              [string]$AppName,
              [string]$DefaultDirName,
              [string]$DefaultGroupName,
              [string]$UninstallDisplayName,
              [string]$OutputBaseFilename,
              [string]$RunDescription
            )

            $iss = @"
          #define MyIcon "$iconPath"

          [Setup]
          AppName=$AppName
          AppVersion=1.0
          AppPublisher=الراجحي
          AppPublisherURL=https://alrajhi.local
          AppSupportURL=https://alrajhi.local
          AppUpdatesURL=https://alrajhi.local
          DefaultDirName=$DefaultDirName
          DefaultGroupName=$DefaultGroupName
          UninstallDisplayName=$UninstallDisplayName
          UninstallDisplayIcon={app}\AlrajhiAccounting.exe
          SetupIconFile={#MyIcon}
          VersionInfoCompany=الراجحي
          VersionInfoDescription=$AppName - ملف التنصيب
          VersionInfoProductName=$AppName
          VersionInfoProductVersion=1.0
          VersionInfoCopyright=Copyright (C) Al Rajhi
          Compression=lzma2
          SolidCompression=yes
          OutputDir=output
          OutputBaseFilename=$OutputBaseFilename
          WizardStyle=modern
          ShowLanguageDialog=yes
          PrivilegesRequired=lowest
          UsedUserAreasWarning=no

          [Languages]
          Name: "arabic"; MessagesFile: "compiler:Languages\Arabic.isl"

          [Files]
          Source: "dist\AlrajhiAccounting\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Tasks]
          Name: "desktopicon"; Description: "إنشاء اختصار على سطح المكتب"; Flags: unchecked

          [Icons]
          Name: "{group}\$AppName"; Filename: "{app}\AlrajhiAccounting.exe"; IconFilename: "{app}\AlrajhiAccounting.exe"
          Name: "{group}\إلغاء تثبيت $AppName"; Filename: "{uninstallexe}"; IconFilename: "{uninstallexe}"
          Name: "{userdesktop}\$AppName"; Filename: "{app}\AlrajhiAccounting.exe"; IconFilename: "{app}\AlrajhiAccounting.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\AlrajhiAccounting.exe"; Description: "$RunDescription"; Flags: postinstall nowait skipifsilent
          "@

            $iss = $iss -replace '(?m)^          ', ''
            Set-Content -Path $Path -Value $iss -Encoding UTF8
          }

          Write-AlrajhiInstallerScript `
            -Path "setup_release.iss" `
            -AppName "Alrajhi Accounting" `
            -DefaultDirName "{pf}\AlrajhiAccounting" `
            -DefaultGroupName "Alrajhi Accounting" `
            -UninstallDisplayName "Alrajhi Accounting" `
            -OutputBaseFilename "AlrajhiAccounting_Release_Setup" `
            -RunDescription "Run Alrajhi Accounting"

          Write-AlrajhiInstallerScript `
            -Path "setup_warehouse_release.iss" `
            -AppName "الراجحي للمحاسبة والمستودعات" `
            -DefaultDirName "{pf}\AlrajhiAccountingWarehouse" `
            -DefaultGroupName "الراجحي للمحاسبة والمستودعات" `
            -UninstallDisplayName "الراجحي للمحاسبة والمستودعات" `
            -OutputBaseFilename "AlrajhiAccountingWarehouse_Release_Setup" `
            -RunDescription "تشغيل الراجحي للمحاسبة والمستودعات"

      - name: Build Release Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup_release.iss

      - name: Build Warehouse Release Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup_warehouse_release.iss

      - name: Upload Release Installer
        uses: actions/upload-artifact@v4
        with:
          name: AlrajhiAccounting_Release_Installer
          path: output/AlrajhiAccounting_Release_Setup.exe

      - name: Upload Release Portable
        uses: actions/upload-artifact@v4
        with:
          name: AlrajhiAccounting_Release_Portable
          path: dist/AlrajhiAccounting

      - name: Upload Warehouse Release Installer
        uses: actions/upload-artifact@v4
        with:
          name: AlrajhiAccountingWarehouse_Release_Installer
          path: output/AlrajhiAccountingWarehouse_Release_Setup.exe

      - name: Upload Warehouse Release Portable
        uses: actions/upload-artifact@v4
        with:
          name: AlrajhiAccountingWarehouse_Release_Portable
          path: dist/AlrajhiAccounting

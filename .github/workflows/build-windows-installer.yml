name: Build Windows Installer

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install requirements
        shell: pwsh
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Validate imports
        shell: pwsh
        run: |
          python -c "import PyQt5"
          python -c "import cv2"
          python -c "from pyzbar.pyzbar import decode"
          python -c "import qrcode"
          python -c "import barcode"
          python -c "import qtawesome"
          python -c "import pyqtgraph"

      - name: Verify project structure
        shell: pwsh
        run: |
          if (!(Test-Path "alrajhi_client\main.py")) {
            throw "Missing alrajhi_client\main.py"
          }

      - name: Copy pyzbar DLLs
        shell: pwsh
        run: |
          $code = @"
          import os
          import shutil
          import pyzbar

          base = os.path.dirname(pyzbar.__file__)

          for dll in ("libiconv.dll", "libzbar-64.dll", "libzbar-32.dll"):
              src = os.path.join(base, dll)
              if os.path.exists(src):
                  shutil.copy(src, ".")
                  print("Copied", dll)
          "@

          Set-Content -Path copy_pyzbar_dlls.py -Value $code -Encoding UTF8
          python copy_pyzbar_dlls.py

      - name: Locate Qt platforms
        id: qtpath
        shell: pwsh
        run: |
          $path = python -c "import PyQt5, os; print(os.path.join(os.path.dirname(PyQt5.__file__), 'Qt5', 'plugins', 'platforms'))"
          echo "platforms_path=$path" >> $env:GITHUB_OUTPUT

      - name: Build executable
        shell: pwsh
        run: |
          $extra = @()

          if (Test-Path "libiconv.dll") {
            $extra += "--add-binary"
            $extra += "libiconv.dll;."
          }

          if (Test-Path "libzbar-64.dll") {
            $extra += "--add-binary"
            $extra += "libzbar-64.dll;."
          }

          if (Test-Path "libzbar-32.dll") {
            $extra += "--add-binary"
            $extra += "libzbar-32.dll;."
          }

          pyinstaller `
            --clean `
            --noconfirm `
            --onedir `
            --windowed `
            --name AlrajhiAccounting `
            --icon alrajhi_client\assets\brand\app.ico `
            --paths alrajhi_client `
            --paths . `
            --collect-all PyQt5 `
            --collect-all pyzbar `
            --collect-all cv2 `
            --collect-all qrcode `
            --collect-all barcode `
            --collect-all qtawesome `
            --collect-all pyqtgraph `
            --hidden-import pyzbar.pyzbar `
            --hidden-import cv2 `
            --hidden-import qrcode `
            --hidden-import barcode `
            --hidden-import decimal `
            --hidden-import sqlite3 `
            --hidden-import requests `
            --hidden-import cryptography `
            --hidden-import openpyxl `
            --hidden-import reportlab `
            --hidden-import waitress `
            --hidden-import flask `
            --hidden-import flask_jwt_extended `
            --add-data "${{ steps.qtpath.outputs.platforms_path }};platforms" `
            --add-data "alrajhi_client\assets\brand;assets\brand" `
            @extra `
            alrajhi_client\main.py

      - name: Download Inno Setup
        shell: pwsh
        run: |
          curl -L -o is.exe https://jrsoftware.org/download.php/is.exe
          .\is.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART

      - name: Download Arabic Language
        shell: pwsh
        run: |
          curl -L -o "C:\Program Files (x86)\Inno Setup 6\Languages\Arabic.isl" https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Arabic.isl

      - name: Create Inno Setup Script
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output | Out-Null

          $iss = @"
          [Setup]
          AppName=Alrajhi Accounting
          AppVersion=1.0
          DefaultDirName={pf}\AlrajhiAccounting
          DefaultGroupName=Alrajhi Accounting
          UninstallDisplayIcon={app}\AlrajhiAccounting.exe
          SetupIconFile=alrajhi_client\assets\brand\app.ico
          Compression=lzma2
          SolidCompression=yes
          OutputDir=output
          OutputBaseFilename=AlrajhiAccounting_Setup
          WizardStyle=modern
          ShowLanguageDialog=yes
          PrivilegesRequired=lowest
          UsedUserAreasWarning=no

          [Languages]
          Name: "arabic"; MessagesFile: "compiler:Languages\Arabic.isl"

          [Files]
          Source: "dist\AlrajhiAccounting\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Tasks]
          Name: "desktopicon"; Description: "Create desktop shortcut"; Flags: unchecked

          [Icons]
          Name: "{group}\Alrajhi Accounting"; Filename: "{app}\AlrajhiAccounting.exe"
          Name: "{group}\Uninstall"; Filename: "{uninstallexe}"
          Name: "{userdesktop}\Alrajhi Accounting"; Filename: "{app}\AlrajhiAccounting.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\AlrajhiAccounting.exe"; Description: "Run Alrajhi Accounting"; Flags: postinstall nowait skipifsilent
          "@

          Set-Content -Path setup.iss -Value $iss -Encoding UTF8

      - name: Build Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - name: Upload Setup
        uses: actions/upload-artifact@v4
        with:
          name: AlrajhiAccounting_Release_Setup
          path: output/AlrajhiAccounting_Setup.exe

      - name: Upload Portable Build
        uses: actions/upload-artifact@v4
        with:
          name: AlrajhiAccounting_Release_Portable
          path: dist/AlrajhiAccounting
